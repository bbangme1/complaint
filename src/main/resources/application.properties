spring.application.name=complaint

server.port=80

#File upload Path Set
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=70MB
filePath=C:/gg/complainimage
uploadPath=file:///C:/gg/complainimage

#thymeleaf set
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

#Database Set
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/bbangme1
spring.datasource.username=bbangme1
spring.datasource.password=123456

#myBatis Set
mybatis.mapper-locations=classpath:/mappers/**.xml
mybatis.configuration.map-underscore-to-camel-case=true

